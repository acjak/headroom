<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://capacycle.com/" />

    <title>Capacycle — Sprint capacity planning for Linear</title>
    <meta name="description" content="Capacycle connects to your Linear workspace and shows you who has capacity, who's overloaded, and whether your cycle will land. Per-person workload, burndown charts, estimate drift tracking, and project forecasting." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://capacycle.com/" />
    <meta property="og:title" content="Capacycle — Sprint capacity planning for Linear" />
    <meta property="og:description" content="See who has capacity, who's overloaded, and whether your cycle will land. No spreadsheets, no guessing." />
    <meta property="og:image" content="https://capacycle.com/screenshots/capacity.png" />
    <meta property="og:site_name" content="Capacycle" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Capacycle — Sprint capacity planning for Linear" />
    <meta name="twitter:description" content="See who has capacity, who's overloaded, and whether your cycle will land. No spreadsheets, no guessing." />
    <meta name="twitter:image" content="https://capacycle.com/screenshots/capacity.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Capacycle",
      "url": "https://capacycle.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Sprint capacity planning tool for Linear. Per-person workload tracking, burndown charts, estimate drift detection, cycle insights, and project forecasting.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Team",
          "price": "9.00",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        },
        {
          "@type": "Offer",
          "name": "Organization",
          "price": "29.00",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        }
      ],
      "featureList": [
        "Per-person capacity tracking",
        "Burndown and velocity charts",
        "Estimate drift detection",
        "Cycle insights and project forecasting",
        "Collaborative kanban boards",
        "Availability calendar",
        "Real-time Linear sync"
      ]
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Pre-Tailwind preflight reset — kept here so the app has usable defaults before
         the JS bundle loads. Once Tailwind preflight runs, its @layer base rules take over
         for all elements and Tailwind utility classes can still override. Note: we do NOT
         reset padding on * here any more, because that was unlayered and outranked
         Tailwind's @layer utilities (e.g. px-3 would silently be overridden). */
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      body { background: #0d0f14; color: #e4e6eb; font-family: 'DM Sans', system-ui, sans-serif; transition: background 0.2s, color 0.2s; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
